services:
  websocket-server:
    build: ./server
    container_name: websocket-server
    image: multiplayer-online-chess-server
    ports:
      - "8080:8080"
  web-client:
    build: ./client
    container_name: chess-client
    image: multiplayer-online-chess-client
    ports:
      - "3000:80"
    depends_on:
      - websocket-server
